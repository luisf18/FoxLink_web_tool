<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Device Resolver Debug</title>
    <link rel="stylesheet" href="css/widgets.css">
    <link rel="stylesheet" href="css/charts.css">
    <link rel="stylesheet" href="css/cards.css">
    <style>
        body {
            font-family: monospace;
            padding: 20px;
        }
        select, input {
            margin: 5px;
            padding: 4px;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            margin-top: 15px;
            max-height: 500px;
            overflow: auto;
        }

        #mainContainer {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        #output {
            flex: 1;
        }

        #cardContainer {
            flex: 1;
        }
    </style>
</head>
<body>

<h3>Device Resolver</h3>

<!-- seleção automática -->
<div>
    <label>Modelo:</label>
    <select id="modelSelect"></select>

    <label>Versão:</label>
    <select id="versionSelect"></select>
</div>

<!-- entrada manual -->
<div>
    <label>ID:</label>
    <input id="idInput" type="number" min="0">

    <label>Versão:</label>
    <input id="verInput" type="number" min="0">
</div>

<div id="mainContainer">
    <pre id="output"></pre>
    <div id="cardContainer"></div>
</div>

<script type="module">
import { FxdeviceCard } from "./js/device_card.js";
import { registryCache, deviceCache, resolveDevice, fillDevicesChace } from "./js/device_resolver.js";

await fillDevicesChace();
window.resolveDevice = resolveDevice;
const deviceRegistry = registryCache;
const deviceDefs = deviceCache;

// Card
const cardContainer = document.getElementById("cardContainer");
let currentCard = null;
window.currentCard = currentCard;

//*/
const modelSel = document.getElementById("modelSelect");
const versionSel = document.getElementById("versionSelect");
const idInput = document.getElementById("idInput");
const verInput = document.getElementById("verInput");
const output = document.getElementById("output");

// popula modelos
for (const id in deviceRegistry) {
    const opt = document.createElement("option");
    opt.value = id;
    opt.textContent = `${deviceRegistry[id].path} (id=0x${Number(id)
        .toString(16)
        .padStart(2, '0')})`;
    modelSel.appendChild(opt);
}

// atualiza versões disponíveis
function updateVersions(id) {
    versionSel.innerHTML = "";
    const name = deviceRegistry[id].path.replace("-", "_");
    const versions = Object.keys(deviceDefs[name]);

    //const base = document.createElement("option");
    //base.value = 0;
    //base.textContent = "base (v0)";
    //versionSel.appendChild(base);

    for (const v of versions) {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = `v${v}`;
        versionSel.appendChild(opt);
    }
}

// resolve e mostra
async function updateOutput() {
    try {
        const id = Number(idInput.value);
        const v  = Number(verInput.value);

        const info = { id: id, fwv: v };

        const dev = await resolveDevice(info);

        // mostra JSON
        output.textContent = JSON.stringify(dev, null, 2);

        // remove card anterior
        if (currentCard) {
            cardContainer.innerHTML = "";
            currentCard = null;
        }

        // cria novo card
        if (dev) {

            console.log("dev:",dev);

            cardContainer.innerHTML = "";
            
            currentCard = new FxdeviceCard(
                0,
                0,
                info,
                dev,
                "dev"
            );

            cardContainer.appendChild(
                document.createElement("div")
            );

            await currentCard.init();

            // supondo que o card crie um elemento raiz acessível:
            if (currentCard.el) {
                cardContainer.appendChild(currentCard.el);
            }
        }

    } catch (e) {
        console.log("erro:",e);
        output.textContent = e.message;
    }

    window.card = currentCard;
}

</script>

</body>
</html>
